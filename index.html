<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quest 3 Murmuration</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px; left: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-family: monospace;
            pointer-events: none;
            z-index: 100;
        }
    </style>
    <!-- Import Map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">VR/AR Boids System<br>Select VR (Void) or AR (Passthrough)</div>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';

        // --- CORE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x030308);
        scene.fog = new THREE.FogExp2(0x030308, 0.035);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Session init requesting hand tracking
        const xrOptions = { optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking'] };
        
        const vrBtn = VRButton.createButton(renderer, xrOptions);
        const arBtn = ARButton.createButton(renderer, xrOptions);
        
        // Stack the buttons
        arBtn.style.bottom = '80px';
        document.body.appendChild(vrBtn);
        document.body.appendChild(arBtn);

        // Handle Passthrough (AR) vs VR modes
        renderer.xr.addEventListener('sessionstart', () => {
            const session = renderer.xr.getSession();
            if (session.mode === 'immersive-ar') {
                scene.background = null;
                scene.fog = null;
                gridHelper.visible = false;
            } else {
                scene.background = new THREE.Color(0x030308);
                scene.fog = new THREE.FogExp2(0x030308, 0.035);
                gridHelper.visible = true;
            }
        });

        // --- LIGHTING ---
        const fillLight = new THREE.HemisphereLight(0x0044aa, 0x001133, 1.5);
        scene.add(fillLight);
        
        const rimLight = new THREE.DirectionalLight(0xff6600, 2.0);
        rimLight.position.set(-10, 10, -10);
        scene.add(rimLight);

        const lightCyan = new THREE.PointLight(0x00ffff, 50, 20);
        const lightMagenta = new THREE.PointLight(0xff00ff, 50, 20);
        scene.add(lightCyan);
        scene.add(lightMagenta);

        // --- ENVIRONMENT ---
        const gridHelper = new THREE.GridHelper(60, 60, 0x222222, 0x111111);
        gridHelper.position.y = -5;
        scene.add(gridHelper);

        // --- HAND TRACKING SETUP ---
        const handModelFactory = new XRHandModelFactory();
        const hands = [];
        
        // Custom glowing material for the hand mesh
        const handMaterial = new THREE.MeshStandardMaterial({
            color: 0x00ffff,
            emissive: 0x00aaff,
            emissiveIntensity: 0.8,
            wireframe: true,
            transparent: true,
            opacity: 0.6
        });

        for (let i = 0; i < 2; i++) {
            const hand = renderer.xr.getHand(i);
            scene.add(hand);
            const handModel = handModelFactory.createHandModel(hand, 'mesh');
            hand.add(handModel);
            hands.push(hand);
        }

        // --- BOID SYSTEM ---
        const BOID_COUNT = 400; 
        const FLOCK_BOUNDS = 8; 
        
        const wingGeo = new THREE.BoxGeometry(0.3, 0.02, 0.15);
        wingGeo.translate(0.15, 0, 0); 

        const boids = [];
        const boidGroup = new THREE.Group();
        boidGroup.position.set(0, 3, -4); 
        scene.add(boidGroup);

        const flockTarget = new THREE.Vector3();

        class Boid {
            constructor(id) {
                this.id = id;
                this.position = new THREE.Vector3(
                    (Math.random() - 0.5) * 8,
                    (Math.random() - 0.5) * 8,
                    (Math.random() - 0.5) * 8
                );
                this.velocity = new THREE.Vector3(
                    (Math.random() - 0.5),
                    (Math.random() - 0.5),
                    (Math.random() - 0.5)
                ).normalize();
                this.acceleration = new THREE.Vector3();

                this.maxSpeed = 0.05 + Math.random() * 0.03; 
                this.maxForce = 0.0008 + Math.random() * 0.0004; 
                this.perceptionRadius = 4.0; 
                this.separationRadius = 0.8 + Math.random() * 0.4; 
                this.agility = 0.8 + Math.random() * 0.4;

                this.mesh = new THREE.Group();
                this.material = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    emissive: 0xffffff,
                    emissiveIntensity: 1.0,
                    roughness: 0.2,
                    metalness: 0.8
                });

                this.wingL = new THREE.Mesh(wingGeo, this.material);
                this.wingR = new THREE.Mesh(wingGeo, this.material);
                this.wingR.scale.x = -1;

                this.mesh.add(this.wingL);
                this.mesh.add(this.wingR);
                this.mesh.position.copy(this.position);
                boidGroup.add(this.mesh);

                this.flapPhase = Math.random() * Math.PI * 2;
                this.rollAngle = 0;
            }

            flock(boids, startIndex, count) {
                let alignment = new THREE.Vector3();
                let cohesion = new THREE.Vector3();
                let separation = new THREE.Vector3();
                let alignTotal = 0;
                let sepTotal = 0;

                const pRadSq = this.perceptionRadius * this.perceptionRadius;
                const sRadSq = this.separationRadius * this.separationRadius;

                for (let i = 0; i < count; i++) {
                    const idx = (startIndex + i) % boids.length;
                    if (idx === this.id) continue;
                    
                    const other = boids[idx];
                    const distSq = this.position.distanceToSquared(other.position);

                    if (distSq > 0 && distSq < pRadSq) {
                        alignment.add(other.velocity);
                        cohesion.add(other.position);
                        alignTotal++;
                    }
                    
                    if (distSq > 0 && distSq < sRadSq) {
                        let diff = new THREE.Vector3().subVectors(this.position, other.position);
                        diff.divideScalar(distSq); 
                        separation.add(diff);
                        sepTotal++;
                    }
                }

                if (alignTotal > 0) {
                    alignment.divideScalar(alignTotal).normalize().multiplyScalar(this.maxSpeed).sub(this.velocity).clampLength(0, this.maxForce);
                    cohesion.divideScalar(alignTotal).sub(this.position).normalize().multiplyScalar(this.maxSpeed).sub(this.velocity).clampLength(0, this.maxForce);
                }
                
                if (sepTotal > 0) {
                    separation.divideScalar(sepTotal).normalize().multiplyScalar(this.maxSpeed).sub(this.velocity).clampLength(0, this.maxForce * 1.5); 
                }

                this.acceleration.add(alignment.multiplyScalar(1.2));
                this.acceleration.add(cohesion.multiplyScalar(0.8));
                this.acceleration.add(separation.multiplyScalar(2.0));
                
                const steerToTarget = new THREE.Vector3().subVectors(flockTarget, this.position);
                steerToTarget.normalize().multiplyScalar(this.maxSpeed).sub(this.velocity).clampLength(0, this.maxForce * 0.4);
                this.acceleration.add(steerToTarget);

                const distFromCenter = this.position.length();
                if (distFromCenter > FLOCK_BOUNDS) {
                    const steerToCenter = new THREE.Vector3().subVectors(new THREE.Vector3(0,0,0), this.position);
                    steerToCenter.normalize().multiplyScalar(this.maxSpeed).sub(this.velocity).clampLength(0, this.maxForce * 1.5); 
                    this.acceleration.add(steerToCenter);
                }

                // --- HAND REPULSION LOGIC ---
                // Makes the boids part like water when hands are nearby
                hands.forEach(hand => {
                    // Extract hand world position
                    const handWorldPos = new THREE.Vector3().setFromMatrixPosition(hand.matrixWorld);
                    
                    // Only react if hand is somewhat close to avoid origin (0,0,0) glitches
                    if (handWorldPos.lengthSq() > 0.01) {
                        // Transform hand world position to local boidGroup space for accurate math
                        const localHandPos = boidGroup.worldToLocal(handWorldPos.clone());
                        
                        const distSq = this.position.distanceToSquared(localHandPos);
                        if (distSq < 2.5) { // Influence radius
                            const push = new THREE.Vector3().subVectors(this.position, localHandPos);
                            // Exponential push based on distance
                            push.normalize().multiplyScalar(this.maxSpeed).sub(this.velocity).clampLength(0, this.maxForce * 6.0);
                            this.acceleration.add(push);
                        }
                    }
                });
            }

            update(dt, time) {
                this.velocity.add(this.acceleration);
                this.velocity.clampLength(0, this.maxSpeed);
                this.position.add(this.velocity);
                this.acceleration.set(0, 0, 0);

                this.mesh.position.copy(this.position);

                const right = new THREE.Vector3(0, 1, 0).cross(this.velocity).normalize();
                const up = new THREE.Vector3().crossVectors(this.velocity, right).normalize();
                
                const lookMatrix = new THREE.Matrix4().lookAt(new THREE.Vector3(), this.velocity, up);
                const targetQuaternion = new THREE.Quaternion().setFromRotationMatrix(lookMatrix);
                
                const lateralAcc = right.dot(this.velocity); 
                const targetRoll = Math.max(Math.min(lateralAcc * -15.0 * this.agility, Math.PI/3), -Math.PI/3);
                
                this.rollAngle += (targetRoll - this.rollAngle) * 0.1;
                
                this.mesh.quaternion.slerp(targetQuaternion, 0.1);
                this.mesh.rotateZ(this.rollAngle);

                const speedMult = (this.velocity.length() / this.maxSpeed) * 30.0;
                this.flapPhase += dt * speedMult;
                
                const flapAngle = Math.sin(this.flapPhase) * 0.6;
                this.wingL.rotation.z = flapAngle;
                this.wingR.rotation.z = -flapAngle;
            }
        }

        for (let i = 0; i < BOID_COUNT; i++) {
            boids.push(new Boid(i));
        }

        // --- RENDER LOOP ---
        const clock = new THREE.Clock();
        let frameCounter = 0;
        const colorCyan = new THREE.Color(0x00ffff);
        const colorMagenta = new THREE.Color(0xff00ff);

        renderer.setAnimationLoop(() => {
            const dt = Math.min(clock.getDelta(), 0.05); 
            const time = clock.getElapsedTime();
            frameCounter++;

            // Hack to force our custom material onto the dynamically loaded hand meshes
            hands.forEach(hand => {
                hand.traverse((child) => {
                    if (child.isMesh && child.material !== handMaterial) {
                        child.material = handMaterial;
                    }
                });
            });

            flockTarget.set(
                Math.sin(time * 0.4) * 6,
                Math.sin(time * 0.25) * 3,
                Math.cos(time * 0.3) * 5
            );

            lightCyan.position.set(Math.cos(time * 0.5) * 15, Math.sin(time * 0.3) * 5 + 5, Math.sin(time * 0.5) * 15 - 5);
            lightMagenta.position.set(Math.cos(time * 0.4 + Math.PI) * 15, Math.cos(time * 0.6) * 5 + 5, Math.sin(time * 0.4 + Math.PI) * 15 - 5);

            let centerOfMass = new THREE.Vector3();
            for(let b of boids) centerOfMass.add(b.position);
            centerOfMass.divideScalar(BOID_COUNT);

            const pulse = 0.6 + 0.4 * Math.sin(time * 2.0);
            const phaseShift = time * 0.2; 

            for (let i = 0; i < boids.length; i++) {
                const boid = boids[i];
                
                boid.flock(boids, (frameCounter * 40) % BOID_COUNT, 40);
                boid.update(dt, time);

                const distToCenter = boid.position.distanceTo(centerOfMass);
                const normalizedDist = Math.max(0, Math.min(distToCenter / (FLOCK_BOUNDS * 0.8), 1.0));
                
                const boidColor = new THREE.Color().lerpColors(colorCyan, colorMagenta, normalizedDist);
                boidColor.offsetHSL(phaseShift % 1.0, 0, 0);

                boid.material.emissive.copy(boidColor);
                boid.material.emissiveIntensity = pulse * (0.8 + 0.2 * Math.random()); 
            }

            renderer.render(scene, camera);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
