<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quest 3 Murmuration</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px; left: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-family: monospace;
            pointer-events: none;
            z-index: 100;
        }
        #audio-prompt {
            position: absolute;
            bottom: 20px; width: 100%; text-align: center;
            color: #00ffff; font-family: monospace; z-index: 100;
        }
    </style>
    <!-- Import Map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">VR/AR Boids System<br>Pull: Double Open Palms<br>Tornado: Pinch fingers<br>Scatter: Punch forward<br>Freeze: Touch index fingers<br><br><b>GOAL: Herd flock through the Golden Anomaly</b></div>
    <div id="audio-prompt">Click anywhere or enter VR to enable Spatial Audio</div>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';

        // --- CORE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010103);
        scene.fog = new THREE.FogExp2(0x010103, 0.035);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 1.6, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        const xrOptions = { optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking'] };
        
        const vrBtn = VRButton.createButton(renderer, xrOptions);
        const arBtn = ARButton.createButton(renderer, xrOptions);
        
        arBtn.style.bottom = '80px';
        document.body.appendChild(vrBtn);
        document.body.appendChild(arBtn);

        // --- AUDIO ENGINE (SYNTHETIC WIND) ---
        let audioCtx, filter, gainNode, noiseSource;
        let audioInitialized = false;

        function initAudio() {
            if (audioInitialized) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            const bufferSize = audioCtx.sampleRate * 2; 
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;

            noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = noiseBuffer;
            noiseSource.loop = true;

            filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 100; 

            gainNode = audioCtx.createGain();
            gainNode.gain.value = 0; 

            noiseSource.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            noiseSource.start();
            audioInitialized = true;
            document.getElementById('audio-prompt').style.display = 'none';
        }

        document.body.addEventListener('pointerdown', initAudio, { once: true });
        vrBtn.addEventListener('click', initAudio);
        arBtn.addEventListener('click', initAudio);

        // --- ENVIRONMENT SETUP ---
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 3000;
        const posArray = new Float32Array(starsCount * 3);
        for(let i = 0; i < starsCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 150;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starsMat = new THREE.PointsMaterial({ size: 0.1, color: 0xffffff, transparent: true, opacity: 0.8 });
        const starMesh = new THREE.Points(starsGeo, starsMat);
        scene.add(starMesh);

        renderer.xr.addEventListener('sessionstart', () => {
            const session = renderer.xr.getSession();
            if (session.mode === 'immersive-ar') {
                scene.background = null;
                scene.fog = null;
                starMesh.visible = false;
            } else {
                scene.background = new THREE.Color(0x010103);
                scene.fog = new THREE.FogExp2(0x010103, 0.035);
                starMesh.visible = true;
            }
        });

        const fillLight = new THREE.HemisphereLight(0x0044aa, 0x001133, 1.5);
        scene.add(fillLight);
        const rimLight = new THREE.DirectionalLight(0xff6600, 2.0);
        rimLight.position.set(-10, 10, -10);
        scene.add(rimLight);
        const lightCyan = new THREE.PointLight(0x00ffff, 50, 20);
        const lightMagenta = new THREE.PointLight(0xff00ff, 50, 20);
        scene.add(lightCyan);
        scene.add(lightMagenta);

        // --- WRIST HUD SETUP ---
        const hudCanvas = document.createElement('canvas');
        hudCanvas.width = 512;
        hudCanvas.height = 300;
        const hudCtx = hudCanvas.getContext('2d');
        const hudTexture = new THREE.CanvasTexture(hudCanvas);
        const hudMat = new THREE.MeshBasicMaterial({ map: hudTexture, transparent: true, opacity: 0.9, depthTest: false });
        
        // Enlarged and repositioned to act like a smartwatch hovering off the wrist
        const hudMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.25, 0.15), hudMat);
        hudMesh.position.set(0, 0.1, 0); 
        hudMesh.rotation.x = -Math.PI / 2; 
        hudMesh.rotation.z = Math.PI / 2;

        let currentScore = 0;
        let currentProgress = 0;
        let totalCaptured = 0;
        let sessionStartTime = null;
        const THRESHOLD = 50; 

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function updateHUD(score, progress, total, timeStr) {
            hudCtx.clearRect(0, 0, 512, 300);
            hudCtx.fillStyle = 'rgba(0, 20, 40, 0.85)';
            hudCtx.fillRect(0, 0, 512, 300);
            
            hudCtx.strokeStyle = '#00ffff';
            hudCtx.lineWidth = 4;
            hudCtx.strokeRect(2, 2, 508, 296);

            hudCtx.fillStyle = '#00ffff';
            hudCtx.font = 'bold 40px monospace';
            hudCtx.textAlign = 'center';
            hudCtx.fillText(`T+ ${timeStr}`, 256, 50);

            hudCtx.fillStyle = '#ffffff';
            hudCtx.font = 'bold 55px monospace';
            hudCtx.fillText(`ANOMALIES: ${score}`, 256, 120);

            // Progress bar
            hudCtx.fillStyle = '#333333';
            hudCtx.fillRect(50, 150, 412, 40);
            
            const fillRatio = Math.min(progress / THRESHOLD, 1.0);
            hudCtx.fillStyle = fillRatio >= 1.0 ? '#ffffff' : '#ffaa00';
            hudCtx.fillRect(54, 154, 404 * fillRatio, 32);
            
            hudCtx.fillStyle = '#ffffff';
            hudCtx.font = '28px monospace';
            hudCtx.fillText(`HERD MASS: ${progress} / ${THRESHOLD}`, 256, 230);
            
            hudCtx.fillStyle = '#aaaaaa';
            hudCtx.font = '24px monospace';
            hudCtx.fillText(`TOTAL BIRDS SAVED: ${total}`, 256, 270);

            hudTexture.needsUpdate = true;
        }
        updateHUD(0, 0, 0, "00:00");

        // --- HAND TRACKING SETUP ---
        const handModelFactory = new XRHandModelFactory();
        const hands = [];
        const previousHandPositions = [new THREE.Vector3(), new THREE.Vector3()];
        
        const handMaterial = new THREE.MeshStandardMaterial({
            color: 0x00ffff, emissive: 0x00aaff, emissiveIntensity: 0.8,
            wireframe: true, transparent: true, opacity: 0.6
        });

        for (let i = 0; i < 2; i++) {
            const hand = renderer.xr.getHand(i);
            scene.add(hand);
            const handModel = handModelFactory.createHandModel(hand, 'mesh');
            hand.add(handModel);
            hands.push(hand);
            
            if (i === 0) {
                // Attach to left hand model group for better tracking stability than raw controller space
                handModel.add(hudMesh);
            }
        }

        const tetherGeo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(), new THREE.Vector3(), 
            new THREE.Vector3(), new THREE.Vector3()
        ]);
        const tetherMat = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0, blending: THREE.AdditiveBlending });
        const tetherLine = new THREE.LineSegments(tetherGeo, tetherMat);
        scene.add(tetherLine);

        // --- BOID SYSTEM (INSTANCED 5000) ---
        const BOID_COUNT = 5000; 
        const FLOCK_BOUNDS = 15; 
        
        // --- CUSTOM BIRD GEOMETRY V3 ---
        // Spine: 0, 0.05, 0 | Belly: 0, -0.05, 0 | Nose: 0, 0, -0.2 | Tail: 0, 0, 0.2
        // WingL: -0.4, 0, 0 | WingR: 0.4, 0, 0
        const vArray = new Float32Array([
            // Left Wing Top
            0,0.05,0,  -0.4,0,0,  0,0,-0.2, 
            0,0.05,0,  0,0,0.2,  -0.4,0,0,  
            // Right Wing Top
            0,0.05,0,  0,0,-0.2,  0.4,0,0,  
            0,0.05,0,  0.4,0,0,   0,0,0.2,  
            // Left Wing Bottom
            0,-0.05,0,  0,0,-0.2, -0.4,0,0, 
            0,-0.05,0,  -0.4,0,0, 0,0,0.2,  
            // Right Wing Bottom
            0,-0.05,0,  0.4,0,0,  0,0,-0.2, 
            0,-0.05,0,  0,0,0.2,  0.4,0,0   
        ]);
        const boidGeo = new THREE.BufferGeometry();
        boidGeo.setAttribute('position', new THREE.BufferAttribute(vArray, 3));
        boidGeo.computeVertexNormals();
        
        // Solid Body Material with PolygonOffset to fix Z-fighting with wireframe
        const boidMat = new THREE.MeshStandardMaterial({ 
            color: 0x222222, roughness: 0.2, metalness: 0.8, side: THREE.DoubleSide,
            polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1
        });
        
        // Sharp black wireframe overlay
        const wireMat = new THREE.MeshBasicMaterial({ 
            color: 0x000000, wireframe: true, transparent: true, opacity: 0.8 
        });

        const shaderInjector = (shader, isEmissive) => {
            shader.vertexShader = `
                attribute float aFlapPhase;
                ${isEmissive ? 'attribute vec3 aGlowColor;\nvarying vec3 vGlowColor;' : ''}
                ${shader.vertexShader}
            `.replace(
                `#include <beginnormal_vertex>`,
                `
                vec3 objectNormal = vec3(normal);
                {
                    float flapWeight = clamp(abs(position.x) / 0.3, 0.0, 1.0);
                    float flapAngle = sin(aFlapPhase) * 0.8;
                    float angle_n = sign(position.x) * flapAngle * flapWeight;
                    float cn = cos(angle_n);
                    float sn = sin(angle_n);
                    float nX = objectNormal.x * cn - objectNormal.y * sn;
                    float nY = objectNormal.x * sn + objectNormal.y * cn;
                    objectNormal.x = nX;
                    objectNormal.y = nY;
                }
                `
            ).replace(
                `#include <begin_vertex>`,
                `
                vec3 transformed = vec3(position);
                {
                    float flapWeight = clamp(abs(position.x) / 0.3, 0.0, 1.0);
                    float flapAngle = sin(aFlapPhase) * 0.8;
                    float angle = sign(position.x) * flapAngle * flapWeight; 
                    float c = cos(angle);
                    float s = sin(angle);
                    float newX = transformed.x * c - transformed.y * s;
                    float newY = transformed.x * s + transformed.y * c;
                    transformed.x = newX;
                    transformed.y = newY;
                }
                ${isEmissive ? 'vGlowColor = aGlowColor;' : ''}
                `
            );
            if (isEmissive) {
                shader.fragmentShader = `
                    varying vec3 vGlowColor;
                    ${shader.fragmentShader}
                `.replace(
                    `#include <emissivemap_fragment>`,
                    `
                    #include <emissivemap_fragment>
                    totalEmissiveRadiance = vGlowColor; 
                    `
                );
            }
        };

        boidMat.onBeforeCompile = (shader) => shaderInjector(shader, true);
        wireMat.onBeforeCompile = (shader) => shaderInjector(shader, false);

        const boids = [];
        const boidGroup = new THREE.Group();
        boidGroup.position.set(0, 4, -10); 
        scene.add(boidGroup);

        const instancedMesh = new THREE.InstancedMesh(boidGeo, boidMat, BOID_COUNT);
        instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        boidGroup.add(instancedMesh);

        const instancedMeshWire = new THREE.InstancedMesh(boidGeo, wireMat, BOID_COUNT);
        instancedMeshWire.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        boidGroup.add(instancedMeshWire);

        const flapPhases = new Float32Array(BOID_COUNT);
        const glowColors = new Float32Array(BOID_COUNT * 3);
        
        boidGeo.setAttribute('aFlapPhase', new THREE.InstancedBufferAttribute(flapPhases, 1));
        boidGeo.setAttribute('aGlowColor', new THREE.InstancedBufferAttribute(glowColors, 3));

        // --- GAME LOGIC: THE ANOMALY ---
        const anomalyGeo = new THREE.TorusGeometry(1.5, 0.05, 16, 64);
        const anomalyMat = new THREE.MeshStandardMaterial({
            color: 0xffaa00, emissive: 0xffaa00, emissiveIntensity: 2.0, transparent: true, opacity: 0.8
        });
        const anomalyMesh = new THREE.Mesh(anomalyGeo, anomalyMat);
        boidGroup.add(anomalyMesh); 

        function relocateAnomaly() {
            anomalyMesh.position.set(
                (Math.random() - 0.5) * 12,
                (Math.random() - 0.5) * 8,
                (Math.random() - 0.5) * 12
            );
            anomalyMat.emissive.setHex(0xffffff);
            anomalyMat.emissiveIntensity = 10.0;
            anomalyMesh.scale.set(1.5, 1.5, 1.5);
        }
        relocateAnomaly();

        const flockTarget = new THREE.Vector3();
        let shockwaves = []; 

        const _align = new THREE.Vector3();
        const _cohesion = new THREE.Vector3();
        const _sep = new THREE.Vector3();
        const _diff = new THREE.Vector3();
        const _tempV = new THREE.Vector3();
        const _vortex = new THREE.Vector3();
        const _zero = new THREE.Vector3(0,0,0);
        const _upAxis = new THREE.Vector3(0,1,0);
        const _right = new THREE.Vector3();
        const _up = new THREE.Vector3();
        const _lookMatrix = new THREE.Matrix4();
        const _targetQuat = new THREE.Quaternion();
        const _dummy = new THREE.Object3D();
        const _tempColor = new THREE.Color();

        class Boid {
            constructor(id) {
                this.id = id;
                this.position = new THREE.Vector3(
                    (Math.random() - 0.5) * 8, (Math.random() - 0.5) * 8, (Math.random() - 0.5) * 8
                );
                this.velocity = new THREE.Vector3((Math.random() - 0.5), (Math.random() - 0.5), (Math.random() - 0.5)).normalize();
                this.acceleration = new THREE.Vector3();
                this.quaternion = new THREE.Quaternion();

                this.maxSpeed = 0.05 + Math.random() * 0.03; 
                this.maxForce = 0.0008 + Math.random() * 0.0004; 
                this.perceptionRadius = 4.0; 
                this.separationRadius = 0.8 + Math.random() * 0.4; 
                this.agility = 0.8 + Math.random() * 0.4;

                this.flapPhase = Math.random() * Math.PI * 2;
                this.rollAngle = 0;
                this.panicTimer = 0; 
            }

            flock(boids, startIndex, count, isTornado, localCenter, localHands) {
                _align.set(0,0,0);
                _cohesion.set(0,0,0);
                _sep.set(0,0,0);
                let alignTotal = 0, sepTotal = 0;

                const pRadSq = this.perceptionRadius * this.perceptionRadius;
                const sRadSq = this.separationRadius * this.separationRadius;

                for (let i = 0; i < count; i++) {
                    const idx = (startIndex + i) % boids.length;
                    if (idx === this.id) continue;
                    
                    const other = boids[idx];
                    const distSq = this.position.distanceToSquared(other.position);

                    if (distSq > 0 && distSq < pRadSq) {
                        _align.add(other.velocity);
                        _cohesion.add(other.position);
                        alignTotal++;
                    }
                    if (distSq > 0 && distSq < sRadSq) {
                        _diff.subVectors(this.position, other.position);
                        _diff.divideScalar(distSq); 
                        _sep.add(_diff);
                        sepTotal++;
                    }
                }

                if (alignTotal > 0) {
                    _align.divideScalar(alignTotal).normalize().multiplyScalar(this.maxSpeed).sub(this.velocity).clampLength(0, this.maxForce);
                    _cohesion.divideScalar(alignTotal).sub(this.position).normalize().multiplyScalar(this.maxSpeed).sub(this.velocity).clampLength(0, this.maxForce);
                }
                if (sepTotal > 0) {
                    _sep.divideScalar(sepTotal).normalize().multiplyScalar(this.maxSpeed).sub(this.velocity).clampLength(0, this.maxForce * 1.5); 
                }

                const alignWeight = this.panicTimer > 0 ? 0.0 : 1.2;
                const cohWeight = this.panicTimer > 0 ? 0.0 : 0.8;
                const sepWeight = this.panicTimer > 0 ? 4.0 : 2.0;

                if (isTornado) {
                    _diff.subVectors(localCenter, this.position);
                    _tempV.set(_diff.x, 0, _diff.z); 
                    _vortex.crossVectors(_upAxis, _tempV).normalize(); 
                    
                    _vortex.multiplyScalar(this.maxSpeed).sub(this.velocity).clampLength(0, this.maxForce * 8.0);
                    _tempV.copy(_upAxis).multiplyScalar(this.maxForce * 2.0); 
                    _diff.normalize().multiplyScalar(this.maxForce * 1.5); 

                    this.acceleration.add(_vortex).add(_tempV).add(_diff);
                    this.acceleration.add(_sep.multiplyScalar(3.0)); 
                } else {
                    this.acceleration.add(_align.multiplyScalar(alignWeight));
                    this.acceleration.add(_cohesion.multiplyScalar(cohWeight));
                    this.acceleration.add(_sep.multiplyScalar(sepWeight));
                    
                    if (this.panicTimer <= 0) {
                        _tempV.subVectors(flockTarget, this.position).normalize().multiplyScalar(this.maxSpeed).sub(this.velocity).clampLength(0, this.maxForce * 0.4);
                        this.acceleration.add(_tempV);
                    }
                }

                for(let i=0; i<shockwaves.length; i++) {
                    const sw = shockwaves[i];
                    const distSq = this.position.distanceToSquared(sw.pos);
                    if (distSq < sw.radius * sw.radius) {
                        _tempV.subVectors(this.position, sw.pos).normalize().multiplyScalar(this.maxForce * 80.0 * sw.life);
                        this.acceleration.add(_tempV);
                        this.panicTimer = 3.0; 
                    }
                }

                const distFromCenter = this.position.length();
                if (distFromCenter > FLOCK_BOUNDS) {
                    _tempV.subVectors(_zero, this.position).normalize().multiplyScalar(this.maxSpeed).sub(this.velocity).clampLength(0, this.maxForce * 1.5); 
                    this.acceleration.add(_tempV);
                }

                for(let i=0; i<localHands.length; i++) {
                    const distSq = this.position.distanceToSquared(localHands[i]);
                    if (distSq < 2.25) { 
                        _tempV.subVectors(this.position, localHands[i]).normalize().multiplyScalar(this.maxSpeed).sub(this.velocity).clampLength(0, this.maxForce * 12.0);
                        this.acceleration.add(_tempV);
                    }
                }
            }

            update(dt, time) {
                if (this.panicTimer > 0) this.panicTimer -= dt;
                
                const currentMaxSpeed = this.panicTimer > 0 ? this.maxSpeed * 2.5 : this.maxSpeed;

                this.velocity.add(this.acceleration.multiplyScalar(dt * 20.0));
                this.velocity.clampLength(0, currentMaxSpeed);
                
                _tempV.copy(this.velocity).multiplyScalar(dt * 20.0);
                this.position.add(_tempV);
                this.acceleration.set(0, 0, 0);

                if (this.velocity.lengthSq() > 0.0001) {
                    _right.crossVectors(_upAxis, this.velocity).normalize();
                    _up.crossVectors(this.velocity, _right).normalize();
                    _lookMatrix.lookAt(_zero, this.velocity, _up);
                    _targetQuat.setFromRotationMatrix(_lookMatrix);
                    
                    const lateralAcc = _right.dot(this.velocity); 
                    const targetRoll = Math.max(Math.min(lateralAcc * -15.0 * this.agility, Math.PI/3), -Math.PI/3);
                    
                    if (dt > 0.01) this.rollAngle += (targetRoll - this.rollAngle) * 0.1;
                    
                    this.quaternion.slerp(_targetQuat, 0.1);
                }

                const speedMult = (this.velocity.length() / this.maxSpeed) * 30.0;
                this.flapPhase += dt * speedMult;
            }
        }

        for (let i = 0; i < BOID_COUNT; i++) {
            boids.push(new Boid(i));
        }

        function getJointPos(hand, jointName) {
            if (hand.joints && hand.joints[jointName]) {
                return new THREE.Vector3().setFromMatrixPosition(hand.joints[jointName].matrixWorld);
            }
            return null;
        }

        // --- RENDER LOOP ---
        const clock = new THREE.Clock();
        let frameCounter = 0;
        const colorCyan = new THREE.Color(0x00ffff);
        const colorMagenta = new THREE.Color(0xff00ff);
        let globalTimeScale = 1.0;

        renderer.setAnimationLoop(() => {
            let rawDt = Math.min(clock.getDelta(), 0.05); 
            const time = clock.getElapsedTime();
            frameCounter++;

            if (sessionStartTime === null) sessionStartTime = time;
            const sessionElapsed = time - sessionStartTime;

            // Anomaly visual logic
            anomalyMesh.rotation.y += rawDt;
            anomalyMesh.rotation.x += rawDt * 0.5;
            if (anomalyMat.emissiveIntensity > 2.0) anomalyMat.emissiveIntensity -= rawDt * 10;
            if (anomalyMesh.scale.x > 1.0) anomalyMesh.scale.lerp(new THREE.Vector3(1,1,1), 0.1);
            anomalyMat.emissive.lerp(new THREE.Color(0xffaa00), 0.05);

            hands.forEach(hand => {
                hand.traverse((child) => {
                    if (child.isMesh && child.material !== handMaterial && child.material !== hudMat) child.material = handMaterial;
                });
            });

            let centerOfMass = new THREE.Vector3();
            let boidsInAnomaly = 0;
            let avgVelocity = 0;

            for(let b of boids) {
                centerOfMass.add(b.position);
                avgVelocity += b.velocity.length();
                if (b.position.distanceToSquared(anomalyMesh.position) < 2.25) { 
                    boidsInAnomaly++;
                }
            }
            centerOfMass.divideScalar(BOID_COUNT);
            avgVelocity /= BOID_COUNT;

            const comWorld = boidGroup.localToWorld(centerOfMass.clone());
            const camPos = new THREE.Vector3().setFromMatrixPosition(camera.matrixWorld);

            // --- SPATIAL AUDIO UPDATE ---
            if (audioInitialized && audioCtx.state === 'running') {
                // Map velocity to filter frequency (makes it roar when they fly fast)
                const targetFreq = 200 + (avgVelocity * 10000);
                filter.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);
                
                // Map distance to volume (louder when closer)
                const distToCam = camPos.distanceTo(comWorld);
                // Ramp volume up sharply as they approach, cap at 1.0
                const targetVol = Math.max(0, Math.min(1.0 - (distToCam / 25.0), 1.0));
                gainNode.gain.setTargetAtTime(targetVol, audioCtx.currentTime, 0.1);
            }

            // Update UI & Game Logic
            if (boidsInAnomaly !== currentProgress || frameCounter % 30 === 0) {
                currentProgress = boidsInAnomaly;
                updateHUD(currentScore, currentProgress, totalCaptured, formatTime(sessionElapsed));
            }

            if (currentProgress >= THRESHOLD) {
                currentScore++;
                totalCaptured += currentProgress;
                relocateAnomaly();
            }

            const localHands = [];
            hands.forEach(hand => {
                let handPos = getJointPos(hand, 'wrist') || new THREE.Vector3().setFromMatrixPosition(hand.matrixWorld);
                if (handPos.lengthSq() > 0.01) {
                    localHands.push(boidGroup.worldToLocal(handPos.clone()));
                }
            });

            // --- GESTURE STATE MACHINE ---
            let activePullingHands = 0;
            let isTornado = false;
            let targetTimeScale = 1.0;
            let activeHandPositions = [];

            let leftIndex = getJointPos(hands[0], 'index-finger-tip');
            let rightIndex = getJointPos(hands[1], 'index-finger-tip');
            if (leftIndex && rightIndex && leftIndex.distanceTo(rightIndex) < 0.05) {
                targetTimeScale = 0.005; 
            }

            hands.forEach((hand, i) => {
                let handWorldPos = getJointPos(hand, 'wrist') || new THREE.Vector3().setFromMatrixPosition(hand.matrixWorld);
                if (handWorldPos.lengthSq() < 0.01) return;

                let velVector = new THREE.Vector3().subVectors(handWorldPos, previousHandPositions[i]);
                let speed = velVector.length() / rawDt;
                previousHandPositions[i].copy(handWorldPos);

                let thumbTip = getJointPos(hand, 'thumb-tip');
                let indexTip = getJointPos(hand, 'index-finger-tip');
                let pinkyTip = getJointPos(hand, 'pinky-finger-tip');
                let wrist = getJointPos(hand, 'wrist');

                if (thumbTip && indexTip && pinkyTip && wrist) {
                    if (thumbTip.distanceTo(indexTip) < 0.03) {
                        isTornado = true;
                    }

                    let isFist = indexTip.distanceTo(wrist) < 0.12 && pinkyTip.distanceTo(wrist) < 0.12;
                    if (isFist && speed > 2.0 && rawDt > 0.001) { 
                        shockwaves.push({
                            pos: boidGroup.worldToLocal(handWorldPos.clone()),
                            radius: 1.0, life: 1.0, expansion: 25.0
                        });
                    }

                    let palmOpen = thumbTip.distanceTo(pinkyTip) > 0.10;
                    const aimDir = new THREE.Vector3().subVectors(handWorldPos, camPos).normalize();
                    const toFlock = new THREE.Vector3().subVectors(comWorld, handWorldPos).normalize();
                    
                    if (palmOpen && aimDir.dot(toFlock) > 0.6) {
                        activePullingHands++;
                        activeHandPositions.push(handWorldPos);
                    }
                }
            });

            for (let i = shockwaves.length - 1; i >= 0; i--) {
                let sw = shockwaves[i];
                sw.radius += sw.expansion * rawDt;
                sw.life -= rawDt * 1.5; 
                if (sw.life <= 0) shockwaves.splice(i, 1);
            }

            globalTimeScale += (targetTimeScale - globalTimeScale) * 0.1;
            let dt = rawDt * globalTimeScale;

            const isPulling = (activePullingHands === 2) && !isTornado;

            if (isPulling) {
                handMaterial.color.setHSL((time * 0.8) % 1.0, 1.0, 0.5);
                handMaterial.emissive.setHSL((time * 0.8) % 1.0, 1.0, 0.5);
                
                const pullTargetWorld = camPos.clone();
                flockTarget.lerp(boidGroup.worldToLocal(pullTargetWorld), 0.05);

                tetherLine.geometry.setFromPoints([
                    activeHandPositions[0], comWorld,
                    activeHandPositions[1], comWorld
                ]);
                tetherMat.opacity = Math.min(tetherMat.opacity + 0.1, 0.8);
                tetherMat.color.copy(handMaterial.color);
            } else if (isTornado) {
                handMaterial.color.setHex(0xaa00ff);
                handMaterial.emissive.setHex(0xdd55ff);
                tetherMat.opacity = Math.max(tetherMat.opacity - 0.1, 0);
            } else {
                handMaterial.color.setHex(0x00ffff);
                handMaterial.emissive.setHex(0x00aaff);
                
                const idleTarget = new THREE.Vector3(
                    Math.sin(time * 0.3) * 8, Math.sin(time * 0.2) * 4, Math.cos(time * 0.25) * 6
                );
                flockTarget.lerp(idleTarget, 0.02);
                tetherMat.opacity = Math.max(tetherMat.opacity - 0.1, 0);
            }

            if (globalTimeScale < 0.1) {
                handMaterial.color.setHex(0xffffff);
                handMaterial.emissive.setHex(0x00ffff);
            }

            lightCyan.position.set(Math.cos(time * 0.5) * 15, Math.sin(time * 0.3) * 5 + 5, Math.sin(time * 0.5) * 15 - 5);
            lightMagenta.position.set(Math.cos(time * 0.4 + Math.PI) * 15, Math.cos(time * 0.6) * 5 + 5, Math.sin(time * 0.4 + Math.PI) * 15 - 5);

            const pulse = 0.6 + 0.4 * Math.sin(time * 2.0);
            const phaseShift = time * 0.2; 

            for (let i = 0; i < BOID_COUNT; i++) {
                const boid = boids[i];
                
                if (globalTimeScale > 0.1) {
                    boid.flock(boids, (frameCounter * 40) % BOID_COUNT, 40, isTornado, centerOfMass, localHands);
                }
                boid.update(dt, time);

                _dummy.position.copy(boid.position);
                _dummy.quaternion.copy(boid.quaternion);
                _dummy.rotateZ(boid.rollAngle);
                _dummy.updateMatrix();
                
                instancedMesh.setMatrixAt(i, _dummy.matrix);
                instancedMeshWire.setMatrixAt(i, _dummy.matrix);

                flapPhases[i] = boid.flapPhase;

                const distToCenter = boid.position.distanceTo(centerOfMass);
                const normalizedDist = Math.max(0, Math.min(distToCenter / (FLOCK_BOUNDS * 0.8), 1.0));
                
                _tempColor.lerpColors(colorCyan, colorMagenta, normalizedDist);
                _tempColor.offsetHSL(phaseShift % 1.0, 0, 0);
                
                const glowMult = pulse * (0.8 + 0.2 * boid.agility); 
                glowColors[i*3] = _tempColor.r * glowMult;
                glowColors[i*3+1] = _tempColor.g * glowMult;
                glowColors[i*3+2] = _tempColor.b * glowMult;
            }

            instancedMesh.instanceMatrix.needsUpdate = true;
            instancedMeshWire.instanceMatrix.needsUpdate = true;
            
            boidGeo.attributes.aFlapPhase.needsUpdate = true;
            boidGeo.attributes.aGlowColor.needsUpdate = true;

            renderer.render(scene, camera);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
